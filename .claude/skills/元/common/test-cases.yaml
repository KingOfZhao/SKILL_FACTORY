## 测试套件（Test Suites）

### full_chain_test
**描述**: 完整链路测试 - 测试从微分拆解到优化器的完整流程
**执行模式**: 自动化
**超时时间**: 300 秒

**测试用例**:
- name: 蓝牙连接优化完整链路
  description: |
    测试完整链路流程：
    1. 微分拆解器识别蓝牙问题
    2. 问题穷举器基于微分分析生成技能树
    3. 生成器生成技能
    4. 扫描器识别技能
    5. 检查器验证合规性
    6. 优化器生成优化方案
  input:
    problem_description: "蓝牙连接不稳定，经常断开"
    problem_type: "bluetooth"
  steps:
    - name: 微分拆解器调用
      command: "/元-skill-微分器"
      args: "蓝牙连接不稳定，经常断开"
      expected_output: "bluetooth" 问题类型，变量定义
      expected_duration: "< 180秒"
      validation: 检查问题类型识别正确性

    - name: 问题穷举器调用
      command: "/元-skill-问题穷举器"
      args: "--mode skilltree"
      input_data: "蓝牙连接问题"
      expected_output: "Skill 树建议"
      expected_duration: "< 180秒"
      validation: 检查技能树结构完整性

    - name: 生成器调用
      command: "/元-skill-生成器"
      args: "--input-skilltree --use-reference-cases"
      input_data: "Skill 树数据"
      expected_output: "生成的 SKILL.md"
      expected_duration: "< 300秒"
      validation: 检查 SKILL.md 文件结构

    - name: 扫描器调用
      command: "/元-skill-扫描器"
      args: "--target 待应用-skill/"
      expected_output: "技能清单文件"
      expected_duration: "< 120秒"
      validation: 检查清单格式和内容完整性

    - name: 检查器调用
      command: "/元-skill-检查器"
      args: "--target 待应用-skill/"
      expected_output: "合规性报告"
      expected_duration: "< 180秒"
      validation: 检查通过的技能数量

    - name: 优化器调用
      command: "/元-skill-优化器"
      args: "--target 待应用-skill/"
      expected_output: "优化方案"
      expected_duration: "< 120秒"
      validation: 检查优化方案数量

  expected_outputs:
    - problem_type_report: "蓝牙问题类型识别"
    - skill_tree: "蓝牙技能树建议"
    - generated_skills: "生成的蓝牙技能文件"
    - skill_inventory: "技能清单"
    - compliance_report: "合规性检查报告"
    - optimization_plan: "优化方案"

- name: RSSI 图表优化完整链路
  description: |
    测试完整链路流程：
    1. 微分拆解器识别 RSSI 图表问题
    2. 问题穷举器生成优化策略
    3. 生成器实现性能优化策略
  input:
    problem_description: "RSSI 图表卡顿，需要优化"
    problem_type: "rssi_chart"
  steps:
    - name: 微分拆解器调用
      command: "/元-skill-微分器"
      args: "RSSI 图表更新太频繁导致界面卡顿"
      expected_output: "rssi_chart" 问题类型，变量定义
      expected_duration: "< 180秒"
      validation: 检查问题类型识别正确性

    - name: 问题穷举器调用
      command: "/元-skill-问题穷举器"
      args: "--mode skilltree"
      input_data: "RSSI 图表性能优化"
      expected_output: "性能优化策略建议"
      expected_duration: "< 180秒"
      validation: 检查策略完整性

  expected_outputs:
    - problem_type_report: "RSSI 图表问题类型识别"
    - optimization_strategies: "性能优化策略"
    - generated_improvements: "生成的性能优化技能"

### integration_test
**描述**: 集成测试 - 测试两个环节之间的集成

**测试用例**:
- name: 生成器 + 扫描器集成
  description: |
    测试生成器和扫描器的数据集成
  steps:
    - name: 调用生成器
      command: "/元-skill-生成器"
      args: "--input-skilltree"
      input_data: "测试技能"
      expected_output: "SKILL.md + description.md"
      expected_duration: "< 300秒"
      validation: 检查输出文件完整性

    - name: 调用扫描器
      command: "/元-skill-扫描器"
      args: "--target 待应用-skill/"
      expected_output: "技能清单"
      expected_duration: "< 120秒"
      validation: 检查清单包含新生成的技能

  expected_outputs:
    - generated_skill_files: "生成的技能文件列表"
    - skill_inventory: "包含新生成的技能的清单"
    - validation_result: "扫描器成功识别新技能"

- name: 检查器 + 优化器集成
  description: |
    测试检查器和优化器的数据流转
  steps:
    - name: 调用检查器
      command: "/元-skill-检查器"
      args: "--target 待应用-skill/"
      expected_output: "合规性报告 (diagnosis.json)"
      expected_duration: "< 180秒"
      validation: 检查报告包含详细的验证结果

    - name: 调用优化器
      command: "/元-skill-优化器"
      args: "--target 待应用-skill/"
      input_data: "diagnosis.json"
      expected_output: "优化方案 (优化计划.md)"
      expected_duration: "< 120秒"
      validation: 检查优化方案包含具体实施步骤

  expected_outputs:
    - compliance_report: "合规性报告"
    - optimization_plan: "优化计划"
    - validation_result: "优化器基于检查结果生成方案"

