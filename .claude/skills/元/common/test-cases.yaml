## 维护说明

### 添加新测试用例
1. 在相应的测试套件下添加新的测试用例
2. 遵循 YAML 格式规范
3. 包含完整的输入、步骤、预期输出、验证标准
4. 更新 version 和 last_updated

### 运行测试
1. 自动化：使用 orchestrator_enhanced.py 的 --run-tests 模式
2. 手动：使用 --single-step e2e-test 模式

### 测试数据管理
- 测试输出存放在 `output/test-outputs/` 目录
- 每次测试前清空该目录
- 保留最近 10 次测试结果

