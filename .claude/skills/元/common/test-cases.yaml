## 测试执行模式（Test Execution Modes）

### 自动化执行
**命令**: `python3 /元/元-skill-orchestrator/orchestrator_enhanced.py --full-chain --run-tests`
**描述**: 运行完整链路并自动执行所有测试用例
**输出**: 测试报告 (test-report.md)
**超时**: 600 秒

### 手动执行
**命令**: `python3 /元/元-skill-orchestrator/orchestrator_enhanced.py --single-step e2e-test --verbose`
**描述**: 手动运行端到端测试
**输出**: 测试报告 (test-report.md)

---

## 验证标准（Validation Standards）

### 测试通过标准（Pass Criteria）
1. **功能正确性**: 所有步骤成功执行
2. **输出完整性**: 所有 expected_outputs 都生成
3. **时效性**: 每个步骤在 expected_duration 内完成
4. **数据一致性**: 数据正确流转，无数据丢失

### 测试失败标准（Fail Criteria）
1. **步骤失败**: 任何步骤执行失败或超时
2. **输出缺失**: expected_outputs 缺失
3. **数据错误**: 数据格式错误或内容错误
4. **超时**: 步骤执行时间超过 expected_duration 的 1.5 倍

